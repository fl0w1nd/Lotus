# git-cliff 配置:按 conventional commits 自动分组生成 Release 说明
# https://git-cliff.org/docs/configuration

[changelog]
header = ""
body = """
{% if version %}\
## {{ version | trim_start_matches(pat="v") }} ({{ timestamp | date(format="%Y-%m-%d") }})
{% else %}\
## Unreleased
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}
{% for commit in commits %}
- {% if commit.scope %}**{{ commit.scope }}:** {% endif %}{{ commit.message | upper_first }} ({{ commit.id | truncate(length=7, end="") }})\
{% endfor %}
{% endfor %}\
"""
footer = ""
trim = true

[git]
conventional_commits = true
filter_unconventional = false
split_commits = false
protect_breaking_commits = true
filter_commits = false
tag_pattern = "v[0-9].*"
sort_commits = "newest"

commit_parsers = [
  { message = "^feat", group = "<!-- 0 -->✨ Features" },
  { message = "^fix", group = "<!-- 1 -->🐛 Bug Fixes" },
  { message = "^perf", group = "<!-- 2 -->⚡ Performance" },
  { message = "^refactor", group = "<!-- 3 -->♻️ Refactor" },
  { message = "^style", group = "<!-- 4 -->🎨 Styling" },
  { message = "^docs", group = "<!-- 5 -->📝 Documentation" },
  { message = "^(ci|build)", group = "<!-- 6 -->👷 CI / Build" },
  { message = "^(test|chore)", group = "<!-- 7 -->🔧 Miscellaneous" },
  { message = ".*", group = "<!-- 8 -->🔖 Other" },
]
