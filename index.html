<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/lotus.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#09090b" />
    <title>Lotus · Nezha Monitoring</title>
    <script>
      // 在 React 挂载前检测系统主题，避免亮色闪烁 (FOUC)
      (function () {
        var forced = window.ForceTheme;
        var dark =
          forced === "dark" ||
          (forced !== "light" &&
            window.matchMedia("(prefers-color-scheme: dark)").matches);
        if (dark) document.documentElement.classList.add("dark");
        var meta = document.querySelector('meta[name="theme-color"]');
        if (meta) meta.content = dark ? "#131316" : "#fbfbfa";
      })();
    </script>
    <script>
      // 自愈:nezha 后端对带 If-Modified-Since 的条件请求会返回畸形的
      // 200 空响应(GinCustomWriter 把 ServeContent 的 304 改写成 200,
      // 而 304 路径已剥掉 Content-Type 和 body),浏览器视其为空脚本而
      // 非缓存命中,导致白屏。脚本/样式加载失败时用 cache:"reload" 绕过
      // 缓存重新拉取(发出无条件请求并刷新缓存条目),再重载页面
      (function () {
        var KEY = "lt-recovered";
        window.addEventListener(
          "error",
          function (e) {
            var el = e.target;
            if (!el || (el.tagName !== "SCRIPT" && el.tagName !== "LINK")) return;
            if (sessionStorage.getItem(KEY)) return;
            sessionStorage.setItem(KEY, "1");
            var urls = [location.pathname + location.search];
            var nodes = document.querySelectorAll("script[src], link[rel=stylesheet][href]");
            for (var i = 0; i < nodes.length; i++) urls.push(nodes[i].src || nodes[i].href);
            // 注意不能用 location.reload():reload 对主文档再次发条件
            // 请求,会再次命中同一个后端 bug。修好缓存后用 replace 导航,
            // 新鲜的缓存条目可被直接复用
            Promise.allSettled(
              urls.map(function (u) {
                return fetch(u, { cache: "reload" });
              })
            ).then(function () {
              location.replace(location.href);
            });
          },
          true
        );
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
