name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # git-cliff 需要完整提交历史

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      - run: pnpm build

      - name: Package dist
        run: |
          cp -r dist nezha-theme-lotus-dist
          zip -r dist.zip nezha-theme-lotus-dist

      # 按 conventional commits 自动分组生成本次 tag 的更新说明
      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        id: changelog
        with:
          config: cliff.toml
          args: --latest --strip all
        env:
          OUTPUT: CHANGELOG.md

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist.zip
          body_path: CHANGELOG.md
