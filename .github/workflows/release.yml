name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      - run: pnpm build

      - name: Package dist
        run: |
          cp -r dist nezha-theme-lotus-dist
          zip -r dist.zip nezha-theme-lotus-dist

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist.zip
          generate_release_notes: true
