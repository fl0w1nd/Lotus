name: "✨ 功能建议"
description: 新功能、视觉优化或体验改进建议
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: motivation
    attributes:
      label: 想解决什么问题
      description: 描述当前的痛点或想达到的效果
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 期望的方案
      description: 你希望它如何工作,如有参考设计/其他主题截图可附上
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 备选方案(可选)
